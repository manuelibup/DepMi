<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <!-- Mask to create the "arrow" gap at the top right -->
    <mask id="gap-cut">
      <rect width="1000" height="1000" fill="white" />
      <rect x="550" y="0" width="90" height="500" fill="black" />
    </mask>
  </defs>

  <g fill="#FF5C38">
    <path mask="url(#gap-cut)" fill-rule="evenodd" d="
      M 323.22 676.78
      L 500 853.55
      L 676.78 676.78
      A 250 250 0 1 0 323.22 676.78
      Z
      
      M 500 360
      A 140 140 0 0 1 500 640
      A 140 140 0 0 1 500 360
      Z
    "/>
    
    <!-- Vertical Ascender Stem: EXTENDED from y=150 to y=50 so it's incredibly prominent -->
    <rect x="640" y="50" width="110" height="450"/>
    
    <circle cx="500" cy="500" r="55"/>
  </g>
</svg>
