        stroke="#059669" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Wheels (Detached) -->
  <circle cx="550" cy="790" r="35" stroke="#059669" stroke-width="45" />
  <circle cx="770" cy="790" r="35" stroke="#059669" stroke-width="45" />
</svg>
