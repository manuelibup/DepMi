<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <!-- Centered mathematically to Y=500 so next/image aligns it perfectly with inline text -->
  
  <!-- Handle and Main Diagonal -->
  <path d="M 180 180 L 250 180 L 450 580" 
        stroke="#059669" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Basket -->
  <path d="M 325 330 L 850 330 L 850 500 L 450 580" 
        stroke="#059669" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Base Chassis Curve & Horizontal Bar -->
