<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <!-- Mask 1: Slices the arrow gap out of the 'd' shape -->
    <mask id="gap-cut">
      <rect width="1000" height="1000" fill="white" />
      <rect x="550" y="0" width="90" height="500" fill="black" />
    </mask>

    <!-- Mask 2: Punches the entire 'd' shape out of the solid background -->
    <mask id="pin-hole">
      <!-- White shows the coral background by default -->
      <rect width="1000" height="1000" fill="white" />
      
      <!-- Black punches absolute transparency through the coral -->
      <g fill="black" transform="translate(-36.5, 48.5)">
        <path mask="url(#gap-cut)" fill-rule="evenodd" d="
          M 323.22 676.78
          L 500 853.55
          L 676.78 676.78
          A 250 250 0 1 0 323.22 676.78
          Z
          
          M 500 360
          A 140 140 0 0 1 500 640
          A 140 140 0 0 1 500 360
          Z
        "/>
        <rect x="640" y="50" width="110" height="450"/>
        <circle cx="500" cy="500" r="55"/>
      </g>
    </mask>
  </defs>

  <!-- True iOS-Style Superellipse (Continuous-Curve Squircle) Background -->
  <path d="M 500 0 C 135 0 0 135 0 500 C 0 865 135 1000 500 1000 C 865 1000 1000 865 1000 500 C 1000 135 865 0 500 0 Z" fill="#FF5C38" mask="url(#pin-hole)"/>
</svg>
